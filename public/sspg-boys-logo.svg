<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">SSPG BOYS logo</title>
  <desc id="desc">Dark circular SSPG BOYS logo with blue flame styling.</desc>
  <defs>
    <radialGradient id="badgeFill" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="72%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="rim" x1="18%" y1="18%" x2="84%" y2="82%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="20%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="78%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f8fafc"/>
